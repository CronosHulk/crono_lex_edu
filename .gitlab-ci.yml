stages:
  - test
  - deploy

.python_test:
  stage: test
  image: python:3.12-slim
  before_script:
    - cd "$CI_PROJECT_DIR"
    - pip install --upgrade pip setuptools wheel
    - pip install --no-cache-dir --retries 10 --timeout 120 -r requirements.txt
  only:
    - main

.frontend_test:
  stage: test
  image: node:lts-slim
  cache:
    key:
      files:
        - admin_web/package-lock.json
        - client_web/package-lock.json
    paths:
      - .npm/
  before_script:
    - npm config set cache "$CI_PROJECT_DIR/.npm" --global
  only:
    - main

backend_tests:
  extends: .python_test
  script:
    - ruff check app tests word_base
    - python -m pytest --ignore=tests/test_architecture_boundaries.py

admin_tests:
  extends: .frontend_test
  script:
    - cd "$CI_PROJECT_DIR"/admin_web
    - npm ci --prefer-offline --no-audit
    - npm run lint
    - npm run typecheck
    - npm run test:coverage

client_tests:
  extends: .frontend_test
  script:
    - cd "$CI_PROJECT_DIR"/client_web
    - npm ci --prefer-offline --no-audit
    - npm run lint
    - npm run typecheck
    - npm run test:coverage

deploy_gcp:
  stage: deploy
  image: google/cloud-sdk:slim
  services:
    - docker:24.0.5-dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    PROJECT_ID: "your-gcp-project-id"
    REGION: "your-gcp-region"
    REPO_NAME: "your-artifact-registry-repo"
    API_SERVICE: "cronolex-api"
    BOT_SERVICE: "cronolex-bot"
    WORKER_SERVICE: "cronolex-embedding-worker"
    CLIENT_SERVICE: "cronolex-web-client"
    ADMIN_SERVICE: "cronolex-web-admin"
    DOCKER_BUILDKIT: "1"
    BUILDKIT_PROGRESS: "plain"

  needs:
    - backend_tests
    - admin_tests
    - client_tests
  only:
    - main
  id_tokens:
    GCP_ID_TOKEN:
      aud: https://iam.googleapis.com/projects/YOUR_GCP_PROJECT_NUMBER/locations/global/workloadIdentityPools/your-workload-pool/providers/your-workload-provider
  before_script:
    - sleep 5
    # В облачном раннере мы под root, поэтому ставим официальный быстрый docker-cli без sudo
    - apt-get update && apt-get install -y --no-install-recommends ca-certificates curl gnupg lsb-release
    - mkdir -p /etc/apt/keyrings
    - curl -fsSL https://download.docker.com/linux/debian/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
    - echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/debian $(lsb_release -cs) stable" | tee /etc/apt/sources.list.d/docker.list > /dev/null
    - apt-get update && apt-get install -y docker-ce-cli docker-buildx-plugin --no-install-recommends
    # Проверка OIDC токена
    - |
      if [ -z "${GCP_ID_TOKEN}" ]; then
        echo "CRITICAL ERROR: GCP_ID_TOKEN is empty! Check Workload Identity configuration in GitLab."
        exit 1
      fi
    - echo "${GCP_ID_TOKEN}" > /tmp/gcp_id_token
    # Авторизация через наш ОФИЦИАЛЬНО созданный пул с условием организации
    - gcloud iam workload-identity-pools create-cred-config "projects/YOUR_GCP_PROJECT_NUMBER/locations/global/workloadIdentityPools/your-workload-pool/providers/your-workload-provider" --output-file=/tmp/gcp_cred_config.json --credential-source-file=/tmp/gcp_id_token --service-account="your-gitlab-deployer-sa@${PROJECT_ID}.iam.gserviceaccount.com"
    - gcloud auth login --cred-file=/tmp/gcp_cred_config.json --quiet
    - gcloud config set project ${PROJECT_ID} --quiet
    - export CLOUDSDK_AUTH_CREDENTIAL_FILE_OVERRIDE=/tmp/gcp_cred_config.json
    - gcloud auth configure-docker ${REGION}-docker.pkg.dev --quiet
  script:
    # 1. СБОРКА И ДЕПЛОЙ API
    - API_IMAGE="${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPO_NAME}/${API_SERVICE}:${CI_COMMIT_SHA}"
    - docker build -t $API_IMAGE .
    - docker push $API_IMAGE
    - gcloud run deploy ${API_SERVICE}
        --image=${API_IMAGE}
        --region=${REGION}
        --memory=1Gi
        --service-account="your-app-runner-sa@${PROJECT_ID}.iam.gserviceaccount.com"
        --add-cloudsql-instances="${PROJECT_ID}:${REGION}:your-cloudsql-db-instance"
        --set-secrets="DATABASE_URL=DATABASE_URL:latest,APP_ENV_FILE=APP_ENV_FILE:latest,PROJECT_ENV_FILE=PROJECT_ENV_FILE:latest"
        --allow-unauthenticated --quiet

    # 2. СБОРКА И ДЕПЛОЙ TELEGRAM BOT
    - BOT_IMAGE="${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPO_NAME}/${BOT_SERVICE}:${CI_COMMIT_SHA}"
    - docker build -t $BOT_IMAGE .
    - docker push $BOT_IMAGE
    - gcloud run deploy ${BOT_SERVICE}
        --image=${BOT_IMAGE}
        --region=${REGION}
        --memory=1Gi
        --service-account="your-app-runner-sa@${PROJECT_ID}.iam.gserviceaccount.com"
        --add-cloudsql-instances="${PROJECT_ID}:${REGION}:your-cloudsql-db-instance"
        --command="python"
        --args="-m,app.bot_main"
        --set-secrets="DATABASE_URL=DATABASE_URL:latest,APP_ENV_FILE=APP_ENV_FILE:latest,PROJECT_ENV_FILE=PROJECT_ENV_FILE:latest"
        --allow-unauthenticated --quiet
    - BOT_URL=$(gcloud run services describe ${BOT_SERVICE} --region=${REGION} --format='value(status.url)')
    - gcloud run services update ${BOT_SERVICE}
        --region=${REGION}
        --update-env-vars="APP__BOT_WEBHOOK_URL=${BOT_URL}/telegram/webhook,APP__BOT_ENABLED=true" --quiet

    # 3. СБОРКА И ДЕПЛОЙ EMBEDDING WORKER
    - WORKER_IMAGE="${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPO_NAME}/${WORKER_SERVICE}:${CI_COMMIT_SHA}"
    - docker build -f Dockerfile.embeddings -t $WORKER_IMAGE .
    - docker push $WORKER_IMAGE
    - gcloud run jobs deploy ${WORKER_SERVICE}
        --image=${WORKER_IMAGE}
        --region=${REGION}
        --memory=2Gi
        --service-account="your-app-runner-sa@${PROJECT_ID}.iam.gserviceaccount.com"
        --set-cloudsql-instances="${PROJECT_ID}:${REGION}:your-cloudsql-db-instance"
        --set-secrets="DATABASE_URL=DATABASE_URL:latest,APP_ENV_FILE=APP_ENV_FILE:latest,PROJECT_ENV_FILE=PROJECT_ENV_FILE:latest"
        --command="python"
        --args="-m,app.embedding_worker_main,--once" --quiet

    # 4. СБОРКА И ДЕПЛОЙ CLIENT WEB
    - CLIENT_IMAGE="${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPO_NAME}/${CLIENT_SERVICE}:${CI_COMMIT_SHA}"
    - cp -r ./frontend_shared ./client_web/frontend_shared
    - docker build -t $CLIENT_IMAGE ./client_web
    - docker push $CLIENT_IMAGE
    - gcloud run deploy ${CLIENT_SERVICE}
        --image=${CLIENT_IMAGE}
        --region=${REGION}
        --port=8080
        --service-account="your-app-runner-sa@${PROJECT_ID}.iam.gserviceaccount.com"
        --allow-unauthenticated --quiet

    # 5. СБОРКА И ДЕПЛОЙ ADMIN WEB
    - ADMIN_IMAGE="${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPO_NAME}/${ADMIN_SERVICE}:${CI_COMMIT_SHA}"
    - cp -r ./frontend_shared ./admin_web/frontend_shared
    - docker build -t $ADMIN_IMAGE ./admin_web
    - docker push $ADMIN_IMAGE
    - gcloud run deploy ${ADMIN_SERVICE}
        --image=${ADMIN_IMAGE}
        --region=${REGION}
        --port=8080
        --service-account="your-app-runner-sa@${PROJECT_ID}.iam.gserviceaccount.com"
        --allow-unauthenticated --quiet
